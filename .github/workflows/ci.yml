name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING: "true"
      EXCHANGE_SANDBOX: "true"
      APP_ENV: "ci"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (excluding slow/testnet)
        run: pytest -m "not slow"

      - name: Analyst golden-set eval gate
        run: python scripts/eval.py --min-accuracy 0.6
